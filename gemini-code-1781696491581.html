<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NGO Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <header class="bg-[#5c061d] text-white shadow-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-user-shield text-2xl text-amber-400"></i>
            <h1 class="text-lg font-bold tracking-wide">Brajlal Memorial Institute | Admin Dashboard</h1>
        </div>
        <button onclick="loadDashboardData()" class="bg-amber-400 hover:bg-amber-500 text-slate-950 font-bold text-xs px-4 py-2 rounded-xl transition">
            <i class="fa-solid fa-rotate mr-1"></i> Refresh Data
        </button>
    </header>

    <main class="container mx-auto px-4 py-8 space-y-12 max-w-7xl">
        
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h2 class="font-bold text-[#5c061d] text-base"><i class="fa-solid fa-clock mr-2 text-amber-500"></i>Pending Applications (<span id="pendingCount">0</span>)</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="bg-slate-100/80 text-slate-600 font-bold border-b border-slate-200">
                            <th class="p-4">Photo</th>
                            <th class="p-4">Member Details</th>
                            <th class="p-4">ID / Identity No</th>
                            <th class="p-4">Address</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingTableBody" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-slate-400 font-medium">Loading panel metrics...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                <h2 class="font-bold text-[#5c061d] text-base"><i class="fa-solid fa-inbox mr-2 text-blue-500"></i>Contact Inbox Message Feed</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="bg-slate-100/80 text-slate-600 font-bold border-b border-slate-200">
                            <th class="p-4">Date/Time</th>
                            <th class="p-4">Sender Profile</th>
                            <th class="p-4">Message Content</th>
                        </tr>
                    </thead>
                    <tbody id="messageTableBody" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="3" class="p-8 text-center text-slate-400 font-medium">No messages synchronized yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // ⚠️ PASTE YOUR COPIED APPS SCRIPT WEB APP URL HERE
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPU7DlC19yPJGB-lXv7-Vt_swzncZugbqSI-tyiR50eVXbVprlt6PrBKdWowbXUvysvQ/exec"; 

        async function loadDashboardData() {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getAdminData`);
                const data = await response.json();
                
                renderPendingMembers(data.members);
                renderMessages(data.messages);
            } catch (err) {
                console.error(err);
                alert("Error synchronizing cloud database.");
            }
        }

        function renderPendingMembers(members) {
            const tbody = document.getElementById('pendingTableBody');
            tbody.innerHTML = "";
            let count = 0;

            const pendingItems = members.filter(m => m.status.toString().trim().toUpperCase() === "PENDING");
            document.getElementById('pendingCount').innerText = pendingItems.length;

            if(pendingItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-emerald-600 font-bold"><i class="fa-solid fa-circle-check mr-1"></i> All clear! No pending applications.</td></tr>`;
                return;
            }

            pendingItems.forEach(m => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition";
                tr.innerHTML = `
                    <td class="p-4">
                        <img src="${m.photo}" class="w-12 h-12 rounded-full object-cover border border-slate-200 bg-slate-100" onerror="this.src='https://via.placeholder.com/150'">
                    </td>
                    <td class="p-4 leading-tight">
                        <div class="font-bold text-slate-900 text-sm">${m.name}</div>
                        <div class="text-slate-500 mt-0.5"><i class="fa-solid fa-phone text-[10px] mr-1"></i>${m.phone}</div>
                        <div class="text-slate-400">${m.email}</div>
                    </td>
                    <td class="p-4 font-mono font-medium text-slate-600">${m.aadhar}</td>
                    <td class="p-4 text-slate-500 max-w-xs truncate">${m.address}</td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="updateStatus('${m.phone}', 'APPROVED')" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-3 py-1.5 rounded-lg transition"><i class="fa-solid fa-check mr-1"></i>Approve</button>
                            <button onclick="updateStatus('${m.phone}', 'REJECTED')" class="bg-rose-500 hover:bg-rose-600 text-white font-bold px-3 py-1.5 rounded-lg transition"><i class="fa-solid fa-xmark mr-1"></i>Reject</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderMessages(messages) {
            const tbody = document.getElementById('messageTableBody');
            tbody.innerHTML = "";

            if(!messages || messages.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-slate-400">Inbox is empty.</td></tr>`;
                return;
            }

            // Ulta loop taaki naye messages upar aayein
            for(let i = messages.length - 1; i >= 0; i--) {
                const msg = messages[i];
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition";
                tr.innerHTML = `
                    <td class="p-4 text-slate-400 font-medium">${new Date(msg.timestamp).toLocaleString()}</td>
                    <td class="p-4">
                        <div class="font-bold text-slate-800">${msg.name}</div>
                        <div class="text-slate-400">${msg.email}</div>
                    </td>
                    <td class="p-4 text-slate-600 font-medium leading-relaxed max-w-md">${msg.message}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        async function updateStatus(phone, statusValue) {
            if(!confirm(`Are you sure you want to set status to ${statusValue}?`)) return;

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'updateStatus');
                formData.append('phoneStatus', phone);
                formData.append('statusValue', statusValue);

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                
                const res = await response.json();
                if(res.status === "success") {
                    alert(`Application Successfully ${statusValue}!`);
                    loadDashboardData(); // Dashboard reload karein
                } else {
                    alert("Operation failed.");
                }
            } catch (err) {
                console.error(err);
                alert("Network communication error.");
            }
        }

        window.onload = loadDashboardData;
    </script>
</body>
</html>
