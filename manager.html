<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager Portal | BMSVS</title>
    <script src="theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-[#5c061d] text-white shadow-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-sliders text-2xl text-amber-400"></i>
            <h1 class="text-lg font-bold tracking-wide">Brajlal Memorial Institute | Content Manager Desk</h1>
        </div>
        <div class="flex items-center gap-2">
            <a href="test-index.html" target="_blank" class="bg-amber-400 hover:bg-amber-500 text-slate-950 font-bold text-xs px-4 py-2 rounded-xl transition shadow-sm"><i class="fa-solid fa-vial-circle-check"></i> Open Tester Page</a>
            <a href="index.html" class="bg-white/10 hover:bg-white/20 text-white font-bold text-xs px-4 py-2 rounded-xl transition"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Site</a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl space-y-8 flex-grow">
        
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm space-y-4">
            <h2 class="text-base font-bold text-[#5c061d] flex items-center gap-2 border-b pb-2">
                <i class="fa-solid fa-circle-plus text-amber-500"></i> नई पोस्ट / मीटिंग जोड़ें (Add New Content)
            </h2>
            <form id="contentForm" onsubmit="handleContentSubmit(event)" class="space-y-4 text-xs font-semibold">
                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-slate-500 mb-1">DATA TYPE (किस सेक्शन में जोड़ना है?)</label>
                        <select id="contentType" required onchange="toggleFormFields(this.value)" class="w-full p-2.5 border rounded-xl bg-slate-50 focus:outline-none focus:border-[#5c061d]">
                            <option value="UPCOMING">UPCOMING (वर्तमान में जारी कार्य - Top Slider)</option>
                            <option value="COMPLETED">COMPLETED (सफलतापूर्वक संपन्न - Bottom Slider)</option>
                            <option value="MEETING">MEETING (निर्धारित बैठकें - Middle Grid)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-slate-500 mb-1">HEADING / TITLE (HINDI) *</label>
                        <input type="text" id="headingHI" required placeholder="हिंदी हेडिंग..." class="w-full p-2.5 border rounded-xl bg-slate-50 focus:outline-none focus:border-[#5c061d]">
                    </div>
                    <div>
                        <label class="block text-slate-500 mb-1">HEADING / TITLE (ENGLISH) *</label>
                        <input type="text" id="headingEN" required placeholder="English Heading..." class="w-full p-2.5 border rounded-xl bg-slate-50 focus:outline-none focus:border-[#5c061d]">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-slate-500 mb-1">DETAILS / TIME (HINDI) *</label>
                        <textarea id="paragraphHI" required rows="2" placeholder="विवरण या बैठक का समय हिंदी में..." class="w-full p-2.5 border rounded-xl bg-slate-50 focus:outline-none focus:border-[#5c061d]"></textarea>
                    </div>
                    <div>
                        <label class="block text-slate-500 mb-1">DETAILS / TIME (ENGLISH) *</label>
                        <textarea id="paragraphEN" required rows="2" placeholder="Details or meeting time in English..." class="w-full p-2.5 border rounded-xl bg-slate-50 focus:outline-none focus:border-[#5c061d]"></textarea>
                    </div>
                </div>

                <div id="photoUploadSection" class="block border-2 border-dashed border-slate-200 p-4 rounded-xl bg-slate-50/50">
                    <label class="block text-slate-600 mb-1 font-bold text-xs"><i class="fa-regular fa-image text-[#5c061d] mr-1"></i> पोस्ट की फोटो चुनें (Select Slider Image)</label>
                    <input type="file" id="postPhotoFile" accept="image/*" onchange="processImageFile(this)" class="text-xs text-slate-500 mt-1">
                    <div id="photoPreviewBox" class="hidden mt-3 flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-100 max-w-xs">
                        <img id="photoThumb" class="w-14 h-14 object-cover rounded-lg border border-slate-200">
                        <span class="text-[10px] text-emerald-600 font-bold"><i class="fa-solid fa-circle-check"></i> Ready to Upload</span>
                    </div>
                </div>

                <div id="meetingLinkSection" class="hidden">
                    <label class="block text-slate-500 mb-1">MEETING URL (गूगल मीट या वीडियो लिंक) *</label>
                    <input type="url" id="meetingURL" placeholder="https://meet.google.com/abc-xyz-123" class="w-full p-2.5 border rounded-xl bg-slate-50 focus:outline-none focus:border-[#5c061d]">
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-[#5c061d] hover:bg-[#4a0416] text-white font-bold py-3 rounded-xl transition text-xs tracking-wider shadow-md">
                    <i class="fa-solid fa-paper-plane mr-1"></i> डेटा लाइव पब्लिश करें (Publish Content)
                </button>
            </form>
        </div>

        <div class="space-y-4">
            <h2 class="text-base font-bold text-[#5c061d] flex items-center gap-2">
                <i class="fa-solid fa-rectangle-list text-amber-500"></i> लाइव डेटा सूची (Live Content Feed)
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="liveDataContainer">
                <div class="text-center py-8 text-slate-400 text-xs col-span-2">Awaiting stream nodes...</div>
            </div>
        </div>

    </main>

    <footer class="bg-[#0f172a] text-slate-500 py-4 text-center text-xs mt-auto">© 2026 Brajlal Memorial Institute.</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6MFWKZVDSu1i4QXM5ZNcnd2myuLs1Pyo",
            authDomain: "bmsvs-hosting.firebaseapp.com",
            projectId: "bmsvs-hosting",
            storageBucket: "bmsvs-hosting.firebasestorage.app",
            messagingSenderId: "527539594907",
            appId: "1:527539594907:web:2b67ba480ae460d7a6483e",
            measurementId: "G-D1LEG857WT",
            databaseURL: "https://bmsvs-hosting-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let base64PostPhoto = "";

        // Smart UI Toggle based on selection type
        function toggleFormFields(selectedType) {
            const photoBlock = document.getElementById('photoUploadSection');
            const fileInput = document.getElementById('postPhotoFile');
            const meetBlock = document.getElementById('meetingLinkSection');
            const meetInput = document.getElementById('meetingURL');

            if(selectedType === "MEETING") {
                photoBlock.className = "hidden";
                fileInput.required = false;
                meetBlock.className = "block";
                meetInput.required = true;
                // Clear photo buffers
                base64PostPhoto = "";
                document.getElementById('photoPreviewBox').classList.add('hidden');
                fileInput.value = "";
            } else {
                photoBlock.className = "block border-2 border-dashed border-slate-200 p-4 rounded-xl bg-slate-50/50";
                fileInput.required = true;
                meetBlock.className = "hidden";
                meetInput.required = false;
                meetInput.value = "";
            }
        }

        // Reader utility to convert local file streams into base64 raw string bits
        function processImageFile(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { alert("File limit configuration is max 5MB!"); input.value = ""; return; }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                base64PostPhoto = e.target.result;
                document.getElementById('photoThumb').src = base64PostPhoto;
                document.getElementById('photoPreviewBox').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // Submit Pipeline Triggering
        async function handleContentSubmit(e) {
            e.preventDefault();
            const type = document.getElementById('contentType').value;
            
            if((type === "UPCOMING" || type === "COMPLETED") && !base64PostPhoto) {
                alert("कृपया पहले पोस्ट की फोटो लोड होने दें!");
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Publishing live...";

            const contentRef = db.ref('siteContent').push();
            
            // Map payloads parameters based on content type mapping
            const payloadUrl = (type === "MEETING") ? document.getElementById('meetingURL').value.trim() : base64PostPhoto;

            try {
                await contentRef.set({
                    id: contentRef.key,
                    Type: type,
                    HeadingHI: document.getElementById('headingHI').value.trim(),
                    HeadingEN: document.getElementById('headingEN').value.trim(),
                    ParagraphHI: document.getElementById('paragraphHI').value.trim(),
                    ParagraphEN: document.getElementById('paragraphEN').value.trim(),
                    ImageURL: payloadUrl // Direct clean structural URL/Base64 injection
                });
                
                alert("बधाई हो! पोस्ट सफलतापूर्वक लाइव सबमिट हो गई।");
                document.getElementById('contentForm').reset();
                document.getElementById('photoPreviewBox').classList.add('hidden');
                base64PostPhoto = "";
                toggleFormFields("UPCOMING"); // Reset state fields views
            } catch (err) { alert("Server database transaction faulted."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-1"></i> डेटा लाइव पब्लिश करें (Publish Content)';
            }
        }

        // Live grid observer pipeline
        db.ref('siteContent').on('value', (snapshot) => {
            const container = document.getElementById('liveDataContainer');
            container.innerHTML = "";
            const data = snapshot.val();
            if(!data) {
                container.innerHTML = `<div class="bg-white p-6 rounded-xl border text-center text-slate-400 font-bold col-span-2 text-xs">कोई भी पोस्ट लाइव नहीं है।</div>`;
                return;
            }
            Object.keys(data).forEach(key => {
                const item = data[key];
                const card = document.createElement('div');
                card.className = "bg-white p-4 border rounded-xl shadow-xs flex justify-between items-start gap-4 animate-fadeIn";
                
                // Photo layout vs meeting badge representation check
                const thumbMarkup = (item.Type === "MEETING") ? 
                    `<div class="w-12 h-12 bg-amber-50 rounded-lg flex items-center justify-center text-amber-600 shrink-0 text-sm"><i class="fa-solid fa-video"></i></div>` :
                    `<img src="${item.ImageURL}" class="w-12 h-12 object-cover rounded-lg border shrink-0 bg-slate-50" onerror="this.src='https://via.placeholder.com/50'">`;

                card.innerHTML = `
                    <div class="flex items-start gap-3 overflow-hidden flex-grow">
                        ${thumbMarkup}
                        <div class="space-y-0.5 text-xs leading-tight overflow-hidden">
                            <span class="bg-rose-100 text-[#5c061d] font-bold text-[8px] px-1.5 py-0.5 rounded uppercase tracking-wider">${item.Type}</span>
                            <h4 class="font-bold text-slate-900 text-sm truncate pt-0.5">${item.HeadingHI}</h4>
                        </div>
                    </div>
                    <button onclick="deleteLog('${key}')" class="text-rose-500 hover:text-rose-700 p-2 text-sm transition shrink-0"><i class="fa-solid fa-trash-can"></i></button>
                `;
                container.appendChild(card);
            });
        });

        async function deleteLog(key) {
            if(confirm("क्या आप इसे लाइव साइट से डिलीट करना चाहते हैं?")) {
                try { await db.ref(`siteContent/${key}`).remove(); } catch(e) { alert("Error."); }
            }
        }
    </script>
</body>
</html>
